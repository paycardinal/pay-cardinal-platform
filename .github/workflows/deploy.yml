name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  SERVICE_DIR: services/elavon-file-gateway
  IMAGE_NAME: elavon-file-gateway
  RUNTIME_SERVICE_ACCOUNT: pc-elavon-runtime@disco-aegis-436919-n8.iam.gserviceaccount.com
  CLOUD_RUN_MEMORY: 512Mi
  CLOUD_RUN_CPU: "1"
  CLOUD_RUN_CONCURRENCY: "80"
  CLOUD_RUN_TIMEOUT: 300
  CLOUD_RUN_MAX_INSTANCES: "20"
  CLOUD_RUN_INGRESS: all

jobs:
  deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build Docker image
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_URI="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "${GITHUB_ENV}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"
          docker build --tag "${IMAGE_URI}" "${SERVICE_DIR}"

      - name: Push Docker image
        run: docker push "${IMAGE_URI}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --image "${IMAGE_URI}" \
            --service-account "${RUNTIME_SERVICE_ACCOUNT}" \
            --memory "${CLOUD_RUN_MEMORY}" \
            --cpu "${CLOUD_RUN_CPU}" \
            --concurrency "${CLOUD_RUN_CONCURRENCY}" \
            --timeout "${CLOUD_RUN_TIMEOUT}" \
            --max-instances "${CLOUD_RUN_MAX_INSTANCES}" \
            --ingress "${CLOUD_RUN_INGRESS}" \
            --platform managed
