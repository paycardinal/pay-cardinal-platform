name: Deploy Template

# Template only. This workflow is intentionally disabled and must not be used
# as an active deployment workflow without a reviewed Sprint decision.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: your-google-cloud-project-id
  REGION: us-central1
  SERVICE_NAME: elavon-file-gateway
  REPOSITORY_NAME: platform-services
  IMAGE_NAME: elavon-file-gateway
  SERVICE_DIR: services/elavon-file-gateway
  WORKLOAD_IDENTITY_PROVIDER: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID
  DEPLOYMENT_SERVICE_ACCOUNT: github-deploy@PROJECT_ID.iam.gserviceaccount.com

jobs:
  deploy-template:
    name: Deployment template only
    runs-on: ubuntu-latest
    if: ${{ false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud with OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYMENT_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          # gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          echo "Configure Docker authentication for Artifact Registry here."

      - name: Build Docker image
        run: |
          # IMAGE_TAG="${GITHUB_SHA::7}"
          # IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY_NAME}/${IMAGE_NAME}:${IMAGE_TAG}"
          # docker build --tag "${IMAGE_URI}" "${SERVICE_DIR}"
          echo "Build the service Docker image here."

      - name: Push Docker image
        run: |
          # docker push "${IMAGE_URI}"
          echo "Push the tagged image to Artifact Registry here."

      - name: Deploy to Cloud Run
        run: |
          # gcloud run deploy "${SERVICE_NAME}" \
          #   --project "${PROJECT_ID}" \
          #   --region "${REGION}" \
          #   --image "${IMAGE_URI}" \
          #   --platform managed
          echo "Deploy the pushed image to Cloud Run here."
